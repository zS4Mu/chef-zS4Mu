<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandPose Label Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; }
  video { display: none; }
  #error-overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    color: white; font: 18px monospace; background: #000;
    z-index: 10;
  }
  #error-overlay.visible { display: flex; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<video id="video" autoplay playsinline></video>
<div id="error-overlay"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2"></script>

<script>
"use strict";

const LABELS = {
  wrist: 'A1',
  thumb_cmc: 'A2',
  thumb_mcp: 'B1',
  thumb_ip: 'C1',
  thumb_tip: 'E1',
  index_finger_mcp: 'B2',
  index_finger_pip: 'C2',
  index_finger_dip: 'D2',
  index_finger_tip: 'E2',
  middle_finger_mcp: 'B3',
  middle_finger_pip: 'C3',
  middle_finger_dip: 'D3',
  middle_finger_tip: 'E3',
  ring_finger_mcp: 'B4',
  ring_finger_pip: 'C4',
  ring_finger_dip: 'D4',
  ring_finger_tip: 'E4',
  pinky_finger_mcp: 'B5',
  pinky_finger_pip: 'C5',
  pinky_finger_dip: 'D5',
  pinky_finger_tip: 'E5'
};

const CONNECTIONS = [
  [0, 1],   [1, 2],   [2, 3],   [3, 4],
  [0, 5],   [5, 6],   [6, 7],   [7, 8],
  [0, 9],   [9, 10],  [10, 11], [11, 12],
  [0, 13],  [13, 14], [14, 15], [15, 16],
  [0, 17],  [17, 18], [18, 19], [19, 20],
  [5, 9],   [9, 13],  [13, 17]
];

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const errorOverlay = document.getElementById('error-overlay');

function showError(msg) {
  errorOverlay.textContent = msg;
  errorOverlay.classList.add('visible');
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    console.log('Camera started, canvas:', canvas.width, canvas.height);
  } catch (err) {
    showError("Permesso fotocamera negato. Consenti l'accesso alla fotocamera e ricarica la pagina.");
    throw err;
  }
}

let detector = null;

async function initDetector() {
  try {
    const model = handPoseDetection.SupportedModels.MediaPipeHands;
    detector = await handPoseDetection.createDetector(model, {
      runtime: 'mediapipe',
      solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands',
      modelType: 'full',
      maxHands: 2
    });
    console.log('Detector initialized');
  } catch (err) {
    showError('Errore inizializzazione modello: ' + err.message);
    throw err;
  }
}

const COLORS = {
  Right: { stroke: 'rgba(0, 204, 255, 0.7)', label: '#00ccff', tag: 'D' },
  Left: { stroke: 'rgba(0, 255, 102, 0.7)', label: '#00ff66', tag: 'S' }
};

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const templates = {};
const RECOGNITION_THRESHOLD = 0.3;
const STABILITY_FRAMES = 5;
let recognitionBuffer = [];
let recognizedLetter = null;
let recordingState = null;
let notification = null;
let lastTimestamp = 0;

function normalizeHand(keypoints) {
  const wrist = keypoints[0];
  const points = keypoints.map(k => ({ x: k.x - wrist.x, y: k.y - wrist.y }));
  let maxDist = 0;
  for (const p of points) {
    const d = Math.sqrt(p.x * p.x + p.y * p.y);
    if (d > maxDist) maxDist = d;
  }
  if (maxDist === 0) return points;
  return points.map(p => ({ x: p.x / maxDist, y: p.y / maxDist }));
}

function captureGesture(hands, letter) {
  const data = {};
  for (const hand of hands) {
    data[hand.handedness] = normalizeHand(hand.keypoints);
  }
  templates[letter] = data;
}

function drawCountdown() {
  if (!recordingState) return;
  ctx.font = '36px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Registrazione ${recordingState.letter}... ${recordingState.countdown}`, canvas.width / 2, canvas.height / 2);
}

function updateRecording(deltaSec) {
  if (!recordingState) return false;
  recordingState.timer += deltaSec;
  recordingState.countdown = Math.ceil(3 - recordingState.timer);
  if (recordingState.timer >= 3) {
    return true;
  }
  return false;
}

function showNotification(letter) {
  notification = { letter, timer: 0 };
}

function drawNotification() {
  if (!notification) return;
  const alpha = Math.max(0, 1 - notification.timer / 1.5);
  ctx.font = '28px monospace';
  ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Riconosciuto: ${notification.letter}`, canvas.width / 2, canvas.height - 60);
}

function updateNotification(deltaSec) {
  if (!notification) return;
  notification.timer += deltaSec;
  if (notification.timer >= 1.5) {
    notification = null;
  }
}

function drawLine(x1, y1, x2, y2, color) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function drawLabel(x, y, text, color) {
  ctx.font = '14px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

const TABLE_COLS = 7;
const TABLE_ROWS = 4;
const CELL_SIZE = 32;
const CELL_GAP = 4;
const TABLE_MARGIN = 60;

function getTableOrigin() {
  const totalW = TABLE_COLS * (CELL_SIZE + CELL_GAP);
  return { x: canvas.width - TABLE_MARGIN - totalW, y: TABLE_MARGIN };
}

function drawAlphabetTable() {
  const origin = getTableOrigin();
  for (let i = 0; i < ALPHABET.length; i++) {
    const col = i % TABLE_COLS;
    const row = Math.floor(i / TABLE_COLS);
    const x = origin.x + col * (CELL_SIZE + CELL_GAP);
    const y = origin.y + row * (CELL_SIZE + CELL_GAP);
    const letter = ALPHABET[i];
    let color = '#555';
    if (recognizedLetter === letter) {
      color = '#00ffcc';
    } else if (templates[letter]) {
      color = '#fff';
    }
    ctx.fillStyle = color;
    ctx.font = '18px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, x + CELL_SIZE / 2, y + CELL_SIZE / 2);
  }
}

function getClickedLetter(mx, my) {
  const origin = getTableOrigin();
  for (let i = 0; i < ALPHABET.length; i++) {
    const col = i % TABLE_COLS;
    const row = Math.floor(i / TABLE_COLS);
    const x = origin.x + col * (CELL_SIZE + CELL_GAP);
    const y = origin.y + row * (CELL_SIZE + CELL_GAP);
    if (mx >= x && mx <= x + CELL_SIZE && my >= y && my <= y + CELL_SIZE) {
      return ALPHABET[i];
    }
  }
  return null;
}

function euclideanDistance(a, b) {
  if (!a || !b || a.length !== b.length) return Infinity;
  let sum = 0;
  for (let i = 0; i < a.length; i++) {
    const dx = a[i].x - b[i].x;
    const dy = a[i].y - b[i].y;
    sum += dx * dx + dy * dy;
  }
  return Math.sqrt(sum / a.length);
}

function recognizeGesture(hands) {
  if (Object.keys(templates).length === 0) return null;
  let bestLetter = null;
  let bestDist = Infinity;
  for (const [letter, template] of Object.entries(templates)) {
    let totalDist = 0;
    let matched = 0;
    for (const hand of hands) {
      const templateHand = template[hand.handedness];
      if (!templateHand) continue;
      const norm = normalizeHand(hand.keypoints);
      const dist = euclideanDistance(norm, templateHand);
      totalDist += dist;
      matched++;
    }
    if (matched === 0) continue;
    const avgDist = totalDist / matched;
    if (avgDist < bestDist) {
      bestDist = avgDist;
      bestLetter = letter;
    }
  }
  if (bestDist < RECOGNITION_THRESHOLD) {
    return bestLetter;
  }
  return null;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const letter = getClickedLetter(mx, my);
  if (letter && !templates[letter] && !recordingState) {
    recordingState = { letter, countdown: 3, timer: 0 };
  }
});

function render(hands) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const hand of hands) {
    const handedness = hand.handedness;
    const colors = COLORS[handedness] || COLORS.Right;
    const kp = hand.keypoints;
    for (const [i, j] of CONNECTIONS) {
      if (kp[i] && kp[j]) {
        drawLine(kp[i].x, kp[i].y, kp[j].x, kp[j].y, colors.stroke);
      }
    }
    for (const point of kp) {
      const label = LABELS[point.name];
      if (label) {
        drawLabel(point.x, point.y, label, colors.label);
      }
    }
    if (kp[0]) {
      drawLabel(kp[0].x + 20, kp[0].y - 20, colors.tag, colors.label);
    }
  }
}

async function detectLoop(timestamp) {
  const deltaSec = lastTimestamp ? (timestamp - lastTimestamp) / 1000 : 0.016;
  lastTimestamp = timestamp;
  try {
    const hands = await detector.estimateHands(video, { flipHorizontal: true });
    if (recordingState) {
      if (updateRecording(deltaSec)) {
        captureGesture(hands, recordingState.letter);
        recordingState = null;
      }
    } else {
      const current = recognizeGesture(hands);
      if (current) {
        recognitionBuffer.push(current);
        if (recognitionBuffer.length > STABILITY_FRAMES) {
          recognitionBuffer.shift();
        }
        const counts = {};
        for (const l of recognitionBuffer) {
          counts[l] = (counts[l] || 0) + 1;
        }
        let maxCount = 0;
        let stableLetter = null;
        for (const [l, c] of Object.entries(counts)) {
          if (c > maxCount) { maxCount = c; stableLetter = l; }
        }
        if (maxCount >= STABILITY_FRAMES * 0.6) {
          if (recognizedLetter !== stableLetter) {
            recognizedLetter = stableLetter;
            showNotification(stableLetter);
          }
        }
      } else {
        recognitionBuffer = [];
        recognizedLetter = null;
      }
    }
    render(hands);
    drawAlphabetTable();
    drawCountdown();
    drawNotification();
    updateNotification(deltaSec);
  } catch (err) {
    console.error('Detection error:', err);
  }
  requestAnimationFrame(detectLoop);
}

async function main() {
  await startCamera();
  await initDetector();
  detectLoop();
}

main();
</script>
</body>
</html>
