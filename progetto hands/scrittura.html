<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrittura Cifre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'DM Sans', sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  #file-input { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 5; }
  #file-input label { color: #888; font: 14px 'DM Sans', sans-serif; cursor: pointer; border: 1px solid #555; padding: 8px 16px; font-weight: 500; }
  #file-input label:hover { border-color: #A3FB00; color: #A3FB00; }
  #file-input input { display: none; }
  #status-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5; color: #666; font: 14px 'DM Sans', sans-serif; font-weight: 300; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<video id="video" autoplay playsinline></video>
<div id="file-input">
  <label for="key-file">Carica chiave...</label>
  <input type="file" id="key-file" accept=".json">
</div>
<div id="status-bar">Nessuna chiave caricata</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2"></script>

<script>
"use strict";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('key-file');
const statusBar = document.getElementById('status-bar');

const CAM_PREVIEW_W = 480;
const CAM_PREVIEW_H = 360;
const CAM_MARGIN = 16;
const EXTEND_THRESHOLD = 0.7;
const COUNTDOWN_SEC = 3;

const COLORS = {
  Right: { stroke: 'rgba(0, 204, 255, 0.7)', label: '#00ccff' },
  Left: { stroke: 'rgba(0, 255, 102, 0.7)', label: '#00ff66' }
};

const CONNECTIONS = [
  [0, 1], [1, 2], [2, 3], [3, 4],
  [0, 5], [5, 6], [6, 7], [7, 8],
  [0, 9], [9, 10], [10, 11], [11, 12],
  [0, 13], [13, 14], [14, 15], [15, 16],
  [0, 17], [17, 18], [18, 19], [19, 20],
  [5, 9], [9, 13], [13, 17]
];

let detector = null;
let lastTimestamp = 0;
let keyMap = null;
let writtenText = [];
let captureState = null;
let keyLoaded = false;
let currentHandDetected = false;
let mouseX = -1, mouseY = -1;

function showError(msg) {
  const overlay = document.getElementById('error-overlay');
  if (!overlay) {
    const el = document.createElement('div');
    el.id = 'error-overlay';
    el.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font:18px DM Sans,sans-serif;background:#000;z-index:10;';
    el.textContent = msg;
    document.body.appendChild(el);
  } else {
    overlay.textContent = msg;
  }
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await video.play();
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  } catch (err) {
    showError("Permesso fotocamera negato.");
    throw err;
  }
}

async function initDetector() {
  try {
    const model = handPoseDetection.SupportedModels.MediaPipeHands;
    detector = await handPoseDetection.createDetector(model, {
      runtime: 'mediapipe',
      solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands',
      modelType: 'full',
      maxHands: 2
    });
  } catch (err) {
    showError('Errore modello: ' + err.message);
    throw err;
  }
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function isFingerStraight(keypoints, mcp, pip, dip) {
  const v1x = keypoints[pip].x - keypoints[mcp].x;
  const v1y = keypoints[pip].y - keypoints[mcp].y;
  const v2x = keypoints[dip].x - keypoints[pip].x;
  const v2y = keypoints[dip].y - keypoints[pip].y;
  const dot = v1x * v2x + v1y * v2y;
  const m1 = Math.sqrt(v1x * v1x + v1y * v1y);
  const m2 = Math.sqrt(v2x * v2x + v2y * v2y);
  if (m1 === 0 || m2 === 0) return false;
  return (dot / (m1 * m2)) > EXTEND_THRESHOLD;
}

function countExtendedFingers(keypoints) {
  let count = 0;
  if (isFingerStraight(keypoints, 5, 6, 7)) count++;
  if (isFingerStraight(keypoints, 9, 10, 11)) count++;
  if (isFingerStraight(keypoints, 13, 14, 15)) count++;
  if (isFingerStraight(keypoints, 17, 18, 19)) count++;
  return count;
}

function drawLine(x1, y1, x2, y2, color) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
}

function getHandCount(hands, targetHand) {
  for (const hand of hands) {
    if (hand.handedness === targetHand) {
      return countExtendedFingers(hand.keypoints);
    }
  }
  return -1;
}

function validateKey(data) {
  if (!data || !data.mappatura) return 'File non valido: manca "mappatura"';
  const entries = Object.entries(data.mappatura);
  if (entries.length !== 10) return 'File non valido: servono 10 cifre (0-9)';
  for (let i = 0; i < 10; i++) {
    const entry = data.mappatura[i.toString()];
    if (!entry) return `File non valido: manca cifra ${i}`;
    if (entry.hand !== 'Left' && entry.hand !== 'Right') return `Cifra ${i}: hand deve essere Left o Right`;
    if (!Number.isInteger(entry.dita_estese) || entry.dita_estese < 0 || entry.dita_estese > 4) return `Cifra ${i}: dita_estese deve essere 0-4`;
  }
  return null;
}

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      const err = validateKey(data);
      if (err) {
        statusBar.textContent = err;
        statusBar.style.color = '#ff4444';
        return;
      }
      keyMap = {};
      for (let i = 0; i < 10; i++) {
        const entry = data.mappatura[i.toString()];
        keyMap[entry.hand + ':' + entry.dita_estese] = i;
      }
      keyLoaded = true;
      document.getElementById('file-input').style.display = 'none';
      statusBar.textContent = '✓ Chiave caricata. Mano non rilevata.';
      statusBar.style.color = '#A3FB00';
    } catch (e) {
      statusBar.textContent = 'Errore: file JSON non valido';
      statusBar.style.color = '#ff4444';
    }
  };
  reader.readAsText(file);
});

function drawSkeleton(hands) {
  for (const hand of hands) {
    const colors = COLORS[hand.handedness] || COLORS.Right;
    const kp = hand.keypoints;
    for (const [i, j] of CONNECTIONS) {
      if (kp[i] && kp[j]) {
        drawLine(kp[i].x, kp[i].y, kp[j].x, kp[j].y, colors.stroke);
      }
    }
    for (const point of kp) {
      ctx.beginPath();
      ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = colors.label;
      ctx.fill();
    }
  }
}

function drawWrittenText() {
  const text = writtenText.length > 0 ? writtenText.join(' ') : '';
  ctx.font = '700 48px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (text) {
    ctx.fillStyle = '#fff';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 40);
  } else {
    ctx.fillStyle = '#444';
    ctx.fillText('—', canvas.width / 2, canvas.height / 2 - 40);
  }
}

function isHit(mx, my, bx, by, bw, bh) {
  return mx >= bx && mx <= bx + bw && my >= by && my <= by + bh;
}

function drawCaptureUI() {
  const btnW = 160;
  const btnH = 48;
  const gap = 20;
  const cx = canvas.width / 2;

  const exportY = canvas.height - 180;
  const rowY = canvas.height - 120;
  const left = cx - btnW - gap / 2;
  const right = cx + gap / 2;

  const exportEnabled = writtenText.length > 0 && !captureState;
  const exportOver = isHit(mouseX, mouseY, cx - btnW / 2, exportY, btnW, btnH) && exportEnabled;
  if (exportOver) {
    ctx.fillStyle = '#A3FB00';
    ctx.fillRect(cx - btnW / 2, exportY, btnW, btnH);
  }
  ctx.strokeStyle = exportOver ? '#A3FB00' : (exportEnabled ? '#A3FB00' : '#444');
  ctx.lineWidth = 1;
  roundRect(ctx, cx - btnW / 2, exportY, btnW, btnH, 0);
  ctx.stroke();
  ctx.fillStyle = exportOver ? '#000' : (exportEnabled ? '#A3FB00' : '#444');
  ctx.font = '500 16px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Export Messaggio', cx, exportY + btnH / 2);

  const scriviEnabled = keyLoaded && !captureState;
  const scriviOver = isHit(mouseX, mouseY, left, rowY, btnW, btnH) && scriviEnabled;
  if (scriviOver) {
    ctx.fillStyle = '#A3FB00';
    ctx.fillRect(left, rowY, btnW, btnH);
  }
  ctx.strokeStyle = scriviOver ? '#A3FB00' : (scriviEnabled ? '#A3FB00' : '#444');
  ctx.lineWidth = 1;
  roundRect(ctx, left, rowY, btnW, btnH, 0);
  ctx.stroke();
  ctx.fillStyle = scriviOver ? '#000' : (scriviEnabled ? '#A3FB00' : '#444');
  ctx.font = '500 16px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Scrivi', left + btnW / 2, rowY + btnH / 2);

  const cancEnabled = writtenText.length > 0 && !captureState;
  const cancOver = isHit(mouseX, mouseY, right, rowY, btnW, btnH) && cancEnabled;
  if (cancOver) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(right, rowY, btnW, btnH);
  }
  ctx.strokeStyle = cancOver ? '#fff' : (cancEnabled ? '#fff' : '#444');
  ctx.lineWidth = 1;
  roundRect(ctx, right, rowY, btnW, btnH, 0);
  ctx.stroke();
  ctx.fillStyle = cancOver ? '#000' : (cancEnabled ? '#fff' : '#444');
  ctx.font = '500 16px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Cancella', right + btnW / 2, rowY + btnH / 2);
}

function drawCountdown() {
  if (!captureState) return;
  const sec = Math.ceil(captureState.countdown);
  ctx.fillStyle = '#fff';
  ctx.font = '700 72px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(sec.toString(), canvas.width / 2, canvas.height / 2 + 40);
}

function roundRect(ctxx, x, y, w, h, r) {
  ctxx.beginPath();
  ctxx.moveTo(x + r, y);
  ctxx.lineTo(x + w - r, y);
  ctxx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctxx.lineTo(x + w, y + h - r);
  ctxx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctxx.lineTo(x + r, y + h);
  ctxx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctxx.lineTo(x, y + r);
  ctxx.quadraticCurveTo(x, y, x + r, y);
  ctxx.closePath();
}

function drawCameraPreview(hands) {
  const camX = canvas.width - CAM_PREVIEW_W - CAM_MARGIN;
  const camY = CAM_MARGIN;
  ctx.save();
  ctx.beginPath();
  ctx.rect(camX, camY, CAM_PREVIEW_W, CAM_PREVIEW_H);
  ctx.clip();
  ctx.translate(camX + CAM_PREVIEW_W, camY);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, CAM_PREVIEW_W, CAM_PREVIEW_H);
  ctx.restore();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(camX, camY, CAM_PREVIEW_W, CAM_PREVIEW_H);
}

function render(hands) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawCameraPreview(hands);
  drawSkeleton(hands);
  drawWrittenText();
  drawCaptureUI();
  drawCountdown();
}

function getHitButton(mx, my) {
  const btnW = 160;
  const btnH = 48;
  const gap = 20;
  const cx = canvas.width / 2;

  const exportY = canvas.height - 180;
  const exportX = cx - btnW / 2;
  if (mx >= exportX && mx <= exportX + btnW && my >= exportY && my <= exportY + btnH) {
    return 'export';
  }

  const rowY = canvas.height - 120;
  const leftX = cx - btnW - gap / 2;
  const rightX = cx + gap / 2;
  if (mx >= leftX && mx <= leftX + btnW && my >= rowY && my <= rowY + btnH) {
    return 'scrivi';
  }
  if (mx >= rightX && mx <= rightX + btnW && my >= rowY && my <= rowY + btnH) {
    return 'cancella';
  }
  return null;
}

let exportDirHandle = null;

async function getExportDir() {
  if (exportDirHandle) return exportDirHandle;
  try {
    exportDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch {
    return null;
  }
  return exportDirHandle;
}

async function exportMessage() {
  const data = {
    nome: 'messaggio-crittato',
    data: new Date().toISOString().split('T')[0],
    cifre: writtenText
  };
  const content = JSON.stringify(data, null, 2);
  const dir = await getExportDir();
  if (dir) {
    const fileHandle = await dir.getFileHandle('messaggio-crittato.json', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(content);
    await writable.close();
  } else {
    const blob = new Blob([content], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'messaggio-crittato.json';
    a.click();
    URL.revokeObjectURL(url);
  }
}

function startCapture() {
  if (!keyLoaded || captureState) return;
  captureState = { timer: 0, countdown: COUNTDOWN_SEC };
}

function backspaceDigit() {
  if (writtenText.length > 0) {
    writtenText.pop();
  }
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -1;
  mouseY = -1;
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  if (captureState) return;

  const hit = getHitButton(mx, my);
  if (!hit) return;

  if (hit === 'export' && writtenText.length > 0) {
    exportMessage();
    return;
  }
  if (hit === 'scrivi') {
    startCapture();
    return;
  }
  if (hit === 'cancella') {
    backspaceDigit();
    return;
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Backspace' && !captureState) {
    backspaceDigit();
  }
});

async function detectLoop(timestamp) {
  const deltaSec = lastTimestamp ? (timestamp - lastTimestamp) / 1000 : 0.016;
  lastTimestamp = timestamp;
  try {
    const hands = await detector.estimateHands(video, { flipHorizontal: true });
    currentHandDetected = hands.length > 0;

    if (captureState) {
      captureState.timer += deltaSec;
      captureState.countdown = COUNTDOWN_SEC - captureState.timer;
      if (captureState.timer >= COUNTDOWN_SEC) {
        for (const hand of hands) {
          const count = countExtendedFingers(hand.keypoints);
          const key = hand.handedness + ':' + count;
          if (keyMap && keyMap[key] !== undefined) {
            writtenText.push(keyMap[key]);
            break;
          }
        }
        captureState = null;
      }
    }

    if (keyLoaded) {
      statusBar.textContent = currentHandDetected ? 'Pronto' : 'Mano non rilevata';
      statusBar.style.color = currentHandDetected ? '#A3FB00' : '#ffcc00';
    }

    render(hands);
  } catch (err) {
    console.error('Detection error:', err);
  }
  requestAnimationFrame(detectLoop);
}

async function main() {
  await startCamera();
  await initDetector();
  detectLoop();
}

main();
</script>
</body>
</html>
