<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zitto &amp; Parlato</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #ffffff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  transition: background 0.3s;
}
svg#face {
  width: min(95vw, 95vh);
  max-width: 1920px;
  display: block;
}
.controls {
  margin-top: 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  justify-content: center;
}
.controls label {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 14px;
  gap: 4px;
}
.controls input[type="range"] {
  width: 140px;
}
.volume-indicator {
  width: 200px;
  height: 8px;
  background: #eee;
  border-radius: 4px;
  overflow: hidden;
}
.volume-indicator-bar {
  height: 100%;
  width: 0%;
  background: #db1d1e;
  border-radius: 4px;
}
.invert-btn {
  padding: 8px 16px;
  border: 2px solid currentColor;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  color: #000;
  transition: color 0.3s;
}
body.invert { background: #000000; }
body.invert svg#face { filter: invert(1); }
body.invert .volume-indicator { background: #333; }
body.invert .volume-indicator-bar { background: #24e2e1; }
body.invert .invert-btn { color: #fff; }
body.invert label { color: #fff; }
</style>
</head>

<div class="controls">
  <label>
    Attack
    <input type="range" id="slider-attack" min="0.01" max="0.5" step="0.01" value="0.1">
  </label>
  <label>
    Release
    <input type="range" id="slider-release" min="0.01" max="0.5" step="0.01" value="0.05">
  </label>
  <label>
    Soglia
    <input type="range" id="slider-threshold" min="0" max="0.1" step="0.005" value="0.02">
  </label>
  <div class="volume-indicator">
    <div class="volume-indicator-bar" id="volume-bar"></div>
  </div>
  <button id="btn-start" class="invert-btn">Avvia Microfono</button>
  <button id="btn-invert" class="invert-btn">Inverti Colori</button>
</div>

<script>
function lerp(a, b, t) {
  return a + (b - a) * t;
}

const PATH_PARAMS = { M:2, m:2, c:6, s:4, h:1, v:1, l:2, q:4, t:2, a:7, C:6, S:4, H:1, V:1, L:2, Q:4, T:2, A:7, Z:0, z:0 };

function lerpPath(dA, dB, t) {
  const re = /[MZLCSHVATlcshatq][^MZLCSHVATlcshatq]*/g;
  const partsA = dA.match(re) || [];
  const partsB = dB.match(re) || [];
  const out = [];
  for (let i = 0; i < Math.min(partsA.length, partsB.length); i++) {
    const chunkA = partsA[i];
    const cmd = chunkA[0];
    const maxNums = PATH_PARAMS[cmd];
    if (maxNums === undefined) { out.push(chunkA); continue; }
    const numsA = (chunkA.slice(1).match(/-?(?:\d+\.?\d*|\.\d+)(?:e[+-]?\d+)?/g) || []).map(Number);
    const numsB = (partsB[i].slice(1).match(/-?(?:\d+\.?\d*|\.\d+)(?:e[+-]?\d+)?/g) || []).map(Number);
    const len = Math.min(numsA.length, numsB.length);
    if (len === 0) { out.push(cmd); continue; }
    out.push(cmd);
    for (let j = 0; j < len; j++) {
      out.push(lerp(numsA[j], numsB[j], t).toFixed(1));
    }
  }
  return out.join(' ');
}

const MORPH = {
  boccaBg: {
    el: () => document.getElementById('bocca-bg'),
    attrs: [
      { attr: 'height', a: 139.6, b: 343.9 }
    ]
  },
  dentiSup: Array.from({ length: 14 }, (_, i) => ({
    el: () => document.getElementById('ds-' + i),
    attrs: [
      { attr: 'height', a: 52.8, b: 108 }
    ]
  })),
  dentiInf: Array.from({ length: 14 }, (_, i) => ({
    el: () => document.getElementById('di-' + i),
    attrs: [
      { attr: 'y', a: 730.7, b: 896.1 },
      { attr: 'height', a: 50.2, b: 100.4 }
    ]
  })),
  pupillaSx: {
    el: () => document.getElementById('pupilla-sx'),
    isPath: true,
    a: 'M849.1,391.8c-4.1,4.7-25.7,4-41.6.7-15.9-3.2-33.5-12.7-29.2-17.5,4.1-4.7,28.5-2.9,44.4.3s30.6,11.7,26.5,16.4h-.1Z',
    b: 'M849.1,403.2c-4.1,13.6-25.7,11.4-41.6,2.1-15.9-9.3-33.5-36.4-29.2-50.1,4.1-13.6,28.5-8.4,44.4.9s30.6,33.5,26.5,47.1h0Z'
  },
  pupillaDx: {
    el: () => document.getElementById('pupilla-dx'),
    isPath: true,
    a: 'M1070.9,391.8c4.1,4.7,25.7,4,41.6.7,15.9-3.2,33.5-12.7,29.2-17.5-4.1-4.7-28.5-2.9-44.4.3s-30.6,11.7-26.5,16.4h.1Z',
    b: 'M1070.9,403.2c4.1,13.6,25.7,11.4,41.6,2.1,15.9-9.3,33.5-36.4,29.2-50.1-4.1-13.6-28.5-8.4-44.4.9s-30.6,33.5-26.5,47.1h0Z'
  }
};

function applyMorph(t) {
  for (const key in MORPH) {
    const item = MORPH[key];
    if (Array.isArray(item)) {
      for (const sub of item) {
        const el = sub.el();
        if (!el) continue;
        for (const a of sub.attrs) {
          el.setAttribute(a.attr, lerp(a.a, a.b, t).toFixed(1));
        }
      }
    } else {
      const el = item.el();
      if (!el) continue;
      if (item.isPath) {
        el.setAttribute('d', lerpPath(item.a, item.b, t));
      } else if (item.attrs) {
        for (const a of item.attrs) {
          el.setAttribute(a.attr, lerp(a.a, a.b, t).toFixed(1));
        }
      }
    }
  }
}

let audioCtx, analyser, dataArray;
let isAudioReady = false;
let envelope = 0;
let micLevel = 0;

const envelopeParams = {
  attack: 0.1,
  release: 0.05,
  threshold: 0.02
};

async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    isAudioReady = true;
    document.getElementById('btn-start').textContent = 'Microfono Attivo';
    document.getElementById('btn-start').disabled = true;
  } catch (e) {
    console.warn('Microfono non accessibile:', e);
    document.getElementById('btn-start').textContent = 'Permesso negato, riprova';
  }
}

function getRMS() {
  if (!isAudioReady) return 0;
  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const val = (dataArray[i] - 128) / 128;
    sum += val * val;
  }
  return Math.sqrt(sum / dataArray.length);
}

function updateEnvelope() {
  micLevel = getRMS();
  const t = envelopeParams.threshold;
  const signal = micLevel > t ? (micLevel - t) / (1 - t) : 0;
  if (signal > envelope) {
    envelope += envelopeParams.attack * (signal - envelope);
  } else {
    envelope += envelopeParams.release * (signal - envelope);
  }
  if (envelope < 0.001) envelope = 0;
}

function updateVolumeUI(level) {
  const bar = document.getElementById('volume-bar');
  if (bar) {
    bar.style.width = Math.min(100, level * 300) + '%';
  }
}

function animate() {
  if (isAudioReady) {
    updateEnvelope();
    applyMorph(envelope);
    updateVolumeUI(micLevel);
  } else {
    applyMorph(0);
  }
  requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('slider-attack').addEventListener('input', function() {
    envelopeParams.attack = parseFloat(this.value);
  });
  document.getElementById('slider-release').addEventListener('input', function() {
    envelopeParams.release = parseFloat(this.value);
  });
  document.getElementById('slider-threshold').addEventListener('input', function() {
    envelopeParams.threshold = parseFloat(this.value);
  });
  document.getElementById('btn-invert').addEventListener('click', () => {
    document.body.classList.toggle('invert');
  });
  document.getElementById('btn-start').addEventListener('click', initAudio);
  animate();
});
</script>
